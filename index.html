<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WealthHealth AI</title>
<link rel="icon" href="wh-icon.png" type="image/png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#000;cursor:default;}

#spiral-canvas{position:fixed;inset:0;display:block;width:100%;height:100%;}

/* Center hit zone — the only clickable element */
#enter-zone{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
  transition:opacity .6s ease;
}
#enter-circle{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;
  width:clamp(220px,28vmin,340px);
  height:clamp(220px,28vmin,340px);
  border-radius:50%;
  cursor:pointer;
  background:transparent;
  border:none;
  -webkit-font-smoothing:antialiased;
  font-family:'Geist',system-ui,sans-serif;
  transition:transform .25s;
}
#enter-circle:hover{ transform:scale(1.04); }
#enter-circle img{
  height:clamp(42px,6vmin,66px);
  width:auto;
  display:block;
  opacity:.9;
  pointer-events:none;
}
#enter-circle span{
  font-size:clamp(18px,3vmin,22px);
  font-weight:300;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:rgba(255,255,255,.85);
  text-shadow:0 0 24px rgba(255,255,255,.3);
  pointer-events:none;
}
</style>
</head>
<body>

<canvas id="spiral-canvas"></canvas>

<div id="enter-zone">
  <div id="enter-circle">
    <img src="wh-slash-icon.png" alt="WealthHealth AI"/>
    <span>Enter</span>
  </div>
</div>

<script>
// ── Ported from Kain0127/spiral-animation (21st.dev) — vanilla JS ──

(function() {
  var canvas = document.getElementById('spiral-canvas');
  var ctx    = canvas.getContext('2d');

  var dpr  = Math.min(window.devicePixelRatio || 1, 2);
  var W    = window.innerWidth;
  var H    = window.innerHeight;
  var size = Math.min(W, H);
  // SCALE: maps spiral's 170-unit radius to ~42% of shorter viewport dimension
  var SCALE = size / 405;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    size = Math.min(W, H);
    SCALE = size / 405;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Constants ──
  var CHANGE_EVENT_TIME   = 0.32;
  var CAMERA_Z            = -400;
  var CAMERA_TRAVEL       = 3400;
  var START_DOT_Y_OFFSET  = 28;
  var VIEW_ZOOM           = 100;
  var NUM_STARS           = 5000;
  var TRAIL_LENGTH        = 80;

  // ── Math helpers ──
  function ease(p, g) {
    if (p < 0.5) return 0.5 * Math.pow(2 * p, g);
    return 1 - 0.5 * Math.pow(2 * (1 - p), g);
  }
  function easeOutElastic(x) {
    var c4 = (2 * Math.PI) / 4.5;
    if (x <= 0) return 0; if (x >= 1) return 1;
    return Math.pow(2, -8 * x) * Math.sin((x * 8 - 0.75) * c4) + 1;
  }
  function mapVal(v, s1, e1, s2, e2) { return s2 + (e2 - s2) * ((v - s1) / (e1 - s1)); }
  function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }
  function lerp(a, b, t) { return a * (1 - t) + b * t; }

  function spiralPath(p) {
    p = clamp(1.2 * p, 0, 1);
    p = ease(p, 1.8);
    var turns = 6;
    var theta = 2 * Math.PI * turns * Math.sqrt(p);
    var r = 170 * SCALE * Math.sqrt(p);  // scaled to viewport
    return { x: r * Math.cos(theta), y: r * Math.sin(theta) + START_DOT_Y_OFFSET };
  }

  function showProjectedDot(pos, sizeFactor, t) {
    var t2 = clamp(mapVal(t, CHANGE_EVENT_TIME, 1, 0, 1), 0, 1);
    var newCameraZ = CAMERA_Z + ease(Math.pow(t2, 1.2), 1.8) * CAMERA_TRAVEL;
    if (pos.z > newCameraZ) {
      var depth = pos.z - newCameraZ;
      var x  = VIEW_ZOOM * pos.x / depth;
      var y  = VIEW_ZOOM * pos.y / depth;
      var sw = 400 * sizeFactor / depth;
      ctx.lineWidth = sw;
      ctx.beginPath();
      ctx.arc(x, y, 0.625, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Star class ──
  function Star() {
    this.angle    = Math.random() * Math.PI * 2;
    this.distance = 30 * Math.random() + 15;
    this.rotDir   = Math.random() > 0.5 ? 1 : -1;
    this.expRate  = 1.2 + Math.random() * 0.8;
    this.finalSc  = 0.7 + Math.random() * 0.6;
    this.dx = this.distance * SCALE * Math.cos(this.angle);
    this.dy = this.distance * SCALE * Math.sin(this.angle);
    this.spiralLoc = (1 - Math.pow(1 - Math.random(), 3.0)) / 1.3;
    this.z = lerp(
      lerp(0.5 * CAMERA_Z, CAMERA_TRAVEL + CAMERA_Z, Math.random()),
      CAMERA_TRAVEL / 2,
      0.3 * this.spiralLoc
    );
    this.swFactor = Math.pow(Math.random(), 2.0);
  }

  Star.prototype.render = function(p, t) {
    var sp = spiralPath(this.spiralLoc);
    var q  = p - this.spiralLoc;
    if (q <= 0) return;

    var dp = clamp(4 * q, 0, 1);
    var linearE  = dp;
    var elasticE = easeOutElastic(dp);
    var powerE   = dp * dp;
    var easing;
    if (dp < 0.3)      easing = lerp(linearE, powerE, dp / 0.3);
    else if (dp < 0.7) easing = lerp(powerE, elasticE, (dp - 0.3) / 0.4);
    else               easing = elasticE;

    var sx, sy;
    if (dp < 0.3) {
      sx = lerp(sp.x, sp.x + this.dx * 0.3, easing / 0.3);
      sy = lerp(sp.y, sp.y + this.dy * 0.3, easing / 0.3);
    } else if (dp < 0.7) {
      var mp  = (dp - 0.3) / 0.4;
      var cs  = Math.sin(mp * Math.PI) * this.rotDir * 1.5;
      var bx  = sp.x + this.dx * 0.3, by = sp.y + this.dy * 0.3;
      var tx2 = sp.x + this.dx * 0.7, ty2 = sp.y + this.dy * 0.7;
      var px  = -this.dy * 0.4 * cs, py = this.dx * 0.4 * cs;
      sx = lerp(bx, tx2, mp) + px * mp;
      sy = lerp(by, ty2, mp) + py * mp;
    } else {
      var fp  = (dp - 0.7) / 0.3;
      var bx2 = sp.x + this.dx * 0.7, by2 = sp.y + this.dy * 0.7;
      var td  = this.distance * this.expRate * 1.5;
      var sa  = this.angle + 1.2 * this.rotDir * fp * Math.PI;
      sx = lerp(bx2, sp.x + td * Math.cos(sa), fp);
      sy = lerp(by2, sp.y + td * Math.sin(sa), fp);
    }

    var vx = (this.z - CAMERA_Z) * sx / VIEW_ZOOM;
    var vy = (this.z - CAMERA_Z) * sy / VIEW_ZOOM;

    var sm = dp < 0.6 ? 1.0 + dp * 0.2 : lerp(1.2, this.finalSc, (dp - 0.6) / 0.4);
    showProjectedDot({ x: vx, y: vy, z: this.z }, 8.5 * this.swFactor * sm, t);
  };

  // ── Build stars with seeded random ──
  var stars = [];
  (function() {
    var origRandom = Math.random;
    var seed = 1234;
    Math.random = function() {
      seed = (seed * 9301 + 49297) % 233280;
      return seed / 233280;
    };
    for (var i = 0; i < NUM_STARS; i++) stars.push(new Star());
    Math.random = origRandom;
  })();

  // ── Animation loop (replaces GSAP) ──
  var time     = 0;
  var lastTs   = null;
  var DURATION = 15; // seconds per loop

  function render() {
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.translate(W / 2, H / 2);
    // No ctx.scale — positions scaled at source, dot sizes stay physically small

    var t1 = clamp(mapVal(time, 0, CHANGE_EVENT_TIME + 0.25, 0, 1), 0, 1);
    var t2 = clamp(mapVal(time, CHANGE_EVENT_TIME, 1, 0, 1), 0, 1);

    ctx.rotate(-Math.PI * ease(t2, 2.7));

    // Trail
    for (var i = 0; i < TRAIL_LENGTH; i++) {
      var f   = mapVal(i, 0, TRAIL_LENGTH, 1.1, 0.1);
      var sw  = (1.3 * (1 - t1) + 3.0 * Math.sin(Math.PI * t1)) * f;
      ctx.fillStyle = 'white';
      ctx.lineWidth = sw;
      var pt = spiralPath(t1 - 0.00015 * i);
      var bPos   = pt;
      var offset = { x: pt.x + 5, y: pt.y + 5 };
      // rotate helper
      var mx = (bPos.x + offset.x) / 2, my = (bPos.y + offset.y) / 2;
      var dx2 = bPos.x - mx, dy2 = bPos.y - my;
      var ang = Math.atan2(dy2, dx2);
      var r2  = Math.sqrt(dx2 * dx2 + dy2 * dy2);
      var o2  = (i % 2 === 0) ? -1 : 1;
      var eP  = Math.sin(time * Math.PI * 2) * 0.5 + 0.5;
      var bounce = Math.sin(eP * Math.PI) * 0.05 * (1 - eP);
      var rx = mx + r2 * (1 + bounce) * Math.cos(ang + o2 * Math.PI * easeOutElastic(eP));
      var ry = my + r2 * (1 + bounce) * Math.sin(ang + o2 * Math.PI * easeOutElastic(eP));
      ctx.beginPath();
      ctx.arc(rx, ry, sw * 0.625, 0, Math.PI * 2);
      ctx.fill();
    }

    // Stars
    ctx.fillStyle = 'white';
    for (var s = 0; s < stars.length; s++) stars[s].render(t1, time);

    // Start dot
    if (time > CHANGE_EVENT_TIME) {
      var dy3 = CAMERA_Z * START_DOT_Y_OFFSET / VIEW_ZOOM;
      showProjectedDot({ x: 0, y: dy3, z: CAMERA_TRAVEL }, 2.5, time);
    }

    ctx.restore();
  }

  function loop(ts) {
    requestAnimationFrame(loop);
    if (lastTs === null) { lastTs = ts; }
    var dt = (ts - lastTs) / 1000;
    lastTs = ts;
    time = (time + dt / DURATION) % 1;
    render();
  }

  requestAnimationFrame(loop);

  // ── Click the center circle only → fade and navigate ──
  var navigating = false;
  document.getElementById('enter-circle').addEventListener('click', function() {
    if (navigating) return;
    navigating = true;
    document.getElementById('enter-zone').style.opacity = '0';
    setTimeout(function() { window.location.href = '/corporate.html'; }, 600);
  });

})();
</script>
</body>
</html>
